<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V.S. Photographs — Portfolio</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #e5e5e5;
      --accent: #d4af88;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10,10,10,0.95);
      padding: 18px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(12px);
    }
    .logo { font-size: 1.9rem; font-weight: bold; color: var(--accent); letter-spacing: 4px; }

    header {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://ibb.co/TDNGCXq3') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .hero h1 {
      font-size: 5.2rem;
      letter-spacing: 12px;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 6px;
    }

    .gallery {
      padding: 100px 5% 80px;
      column-count: 3;
      column-gap: 20px;
    }
    .gallery img {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 8px;
      transition: 0.4s ease;
      cursor: pointer;
    }
    .gallery img:hover {
      transform: scale(1.04);
      opacity: 0.92;
    }

    footer {
      text-align: center;
      padding: 80px 20px 50px;
      border-top: 1px solid #222;
    }
    .social a {
      color: var(--accent);
      font-size: 1.5rem;
      margin: 0 20px;
      text-decoration: none;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.98);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .lightbox img { 
      max-width: 92%; 
      max-height: 92vh; 
      border-radius: 12px;
    }

    @media (max-width: 900px) {
      .gallery { column-count: 2; }
      .hero h1 { font-size: 3.6rem; }
    }
  </style>
</head>
